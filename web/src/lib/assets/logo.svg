<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#238636"/>
      <stop offset="100%" style="stop-color:#2ea043"/>
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="200" cy="200" r="180" fill="url(#bg)"/>
  
  <!-- Code Brackets -->
  <text x="200" y="260" font-family="SF Mono, Monaco, Consolas, monospace" font-size="140" font-weight="bold" fill="white" text-anchor="middle">{ }</text>
  
  <!-- Lobster/Crab Icon (simplified) -->
  <g transform="translate(200, 140)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="50" ry="40" fill="#FFD700"/>
    <!-- Claws -->
    <circle cx="-60" cy="-10" r="20" fill="#FFD700"/>
    <circle cx="60" cy="-10" r="20" fill="#FFD700"/>
    <!-- Eyes -->
    <circle cx="-15" cy="-25" r="8" fill="#1a1a1a"/>
    <circle cx="15" cy="-25" r="8" fill="#1a1a1a"/>
    <!-- Antennae -->
    <path d="M -15 -30 L -25 -50" stroke="#FFD700" stroke-width="4" stroke-linecap="round"/>
    <path d="M 15 -30 L 25 -50" stroke="#FFD700" stroke-width="4" stroke-linecap="round"/>
    <circle cx="-25" cy="-50" r="4" fill="#FFD700"/>
    <circle cx="25" cy="-50" r="4" fill="#FFD700"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="350" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="600" fill="white" text-anchor="middle">MockAPI</text>
</svg>