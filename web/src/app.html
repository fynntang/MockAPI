<!doctype html>
<html lang="%paraglide.lang%" dir="%paraglide.dir%" class="dark">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="Lightweight local API mock server. Zero dependencies, one binary, 24x faster." />
		<meta name="keywords" content="API Mock, Mock Server, Developer Tools, Go, GraphQL, WebSocket, gRPC" />
		<meta name="theme-color" content="#3f3f46" />

		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://mockapi.work/" />
		<meta property="og:title" content="MockAPI — The Fastest Way to Mock APIs" />
		<meta property="og:description" content="Lightweight local API mock server. Zero dependencies, one binary, 24x faster routing." />
		<meta property="og:image" content="https://mockapi.work/og-image.png" />
		<meta property="og:site_name" content="MockAPI" />
		<meta property="og:locale" content="en_US" />

		<!-- Twitter -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:url" content="https://mockapi.work/" />
		<meta name="twitter:title" content="MockAPI — The Fastest Way to Mock APIs" />
		<meta name="twitter:description" content="Lightweight local API mock server. Zero dependencies, one binary, 24x faster routing." />
		<meta name="twitter:image" content="https://mockapi.work/og-image.png" />

		<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7317166346096257" crossorigin="anonymous"></script>
		<!-- Google tag (gtag.js) -->
		<script async src="https://www.googletagmanager.com/gtag/js?id=G-ZQDTDHP3SQ"></script>
		<script>
			window.dataLayer = window.dataLayer || [];
			function gtag(){dataLayer.push(arguments);}
			gtag('js', new Date());
			gtag('config', 'G-ZQDTDHP3SQ');
		</script>
		<script>
			// Theme initialization - runs before page renders
			(function() {
				const stored = localStorage.getItem('theme');
				const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
				const theme = stored || (prefersDark ? 'dark' : 'light');
				document.documentElement.classList.toggle('dark', theme === 'dark');
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="bg-white dark:bg-zinc-950 text-zinc-900 dark:text-white">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
