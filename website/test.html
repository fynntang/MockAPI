<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MockAPI Landing Page - Test Suite</title>
  <style>
    * { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    body {
      background: linear-gradient(135deg, #080810 0%, #0F0F1A 50%, #1A1A2E 100%);
      min-height: 100vh;
      color: #fff;
      padding: 40px 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { color: #8B5CF6; font-size: 2.5rem; margin-bottom: 30px; }
    h2 { color: #a78bfa; font-size: 1.5rem; margin: 30px 0 15px; }
    .test-section {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 24px;
      margin: 20px 0;
    }
    .test-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .test-item:last-child { border-bottom: none; }
    .pass { color: #10B981; font-weight: 600; }
    .fail { color: #EF4444; font-weight: 600; }
    .pending { color: #F59E0B; }
    .summary {
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 12px;
      padding: 20px;
      margin-top: 30px;
      text-align: center;
    }
    .summary h3 { font-size: 1.8rem; margin-bottom: 10px; }
    button {
      background: linear-gradient(135deg, #8B5CF6, #6366F1);
      border: none;
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      margin: 10px 5px;
      transition: all 0.3s ease;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(139, 92, 246, 0.4);
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      margin: 20px 0;
    }
    .metric-card {
      background: rgba(139, 92, 246, 0.08);
      border: 1px solid rgba(139, 92, 246, 0.2);
      padding: 20px;
      border-radius: 12px;
      text-align: center;
    }
    .metric-value {
      font-size: 2.5rem;
      font-weight: 800;
      color: #8B5CF6;
    }
    .metric-label {
      font-size: 14px;
      color: #9CA3AF;
      margin-top: 8px;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #8B5CF6;
      text-decoration: none;
      margin-bottom: 20px;
    }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Back to Home</a>
    
    <h1>🦞 MockAPI Landing Page - Test Suite</h1>
    
    <div class="test-section">
      <h2>🚀 Run Tests</h2>
      <button onclick="runAllTests()">Run All Tests</button>
      <button onclick="location.href='/'">View Landing Page</button>
    </div>

    <div class="test-section">
      <h2>📊 Performance Metrics</h2>
      <div class="metrics" id="metrics">
        <div class="metric-card">
          <div class="metric-value" id="loadTime">-</div>
          <div class="metric-label">Load Time (ms)</div>
        </div>
        <div class="metric-card">
          <div class="metric-value" id="fileSize">-</div>
          <div class="metric-label">File Size (KB)</div>
        </div>
        <div class="metric-card">
          <div class="metric-value" id="lineCount">-</div>
          <div class="metric-label">Lines of Code</div>
        </div>
      </div>
    </div>

    <div class="test-section">
      <h2>✅ Test Results</h2>
      <div id="testResults">
        <p class="pending">Click "Run All Tests" to start...</p>
      </div>
    </div>

    <div id="summary" class="summary" style="display: none;">
      <h3 id="summaryTitle">All Tests Passed!</h3>
      <p id="summaryText"></p>
    </div>
  </div>

  <script>
    let testsPassed = 0;
    let testsFailed = 0;

    async function runAllTests() {
      const results = document.getElementById('testResults');
      results.innerHTML = '';
      testsPassed = 0;
      testsFailed = 0;

      // Fetch the landing page
      try {
        const response = await fetch('/');
        const html = await response.text();
        const start = performance.now();

        // Performance metrics
        document.getElementById('loadTime').textContent = (performance.now() - start).toFixed(0);
        document.getElementById('fileSize').textContent = (html.length / 1024).toFixed(2);
        document.getElementById('lineCount').textContent = html.split('\n').length;

        // Run tests
        runTest('Page loads successfully', response.ok);
        runTest('Has title tag', html.includes('<title>'));
        runTest('Title contains MockAPI', html.includes('MockAPI'));
        runTest('Has viewport meta', html.includes('viewport'));
        runTest('Has navigation', html.includes('<nav'));
        runTest('Has hero section', html.includes('gradient-text'));
        runTest('Has features section', html.includes('id="features"'));
        runTest('Has pricing section', html.includes('id="pricing"'));
        runTest('Has download section', html.includes('id="download"'));
        runTest('Has Product Hunt badge', html.includes('producthunt'));
        runTest('Has GitHub link', html.includes('github.com/fynntang/MockAPI'));
        runTest('Has CTA buttons', (html.match(/btn-primary/g) || []).length >= 3);
        runTest('Has animations', html.includes('@keyframes'));
        runTest('Has responsive design', html.includes('md:'));
        runTest('Uses Tailwind CSS', html.includes('tailwindcss'));
        runTest('Has Inter font', html.includes('Inter'));

        // Show summary
        showSummary();

      } catch (error) {
        results.innerHTML = `<p class="fail">Error loading page: ${error.message}</p>`;
      }
    }

    function runTest(name, passed) {
      const results = document.getElementById('testResults');
      const status = passed ? '✅ PASS' : '❌ FAIL';
      const className = passed ? 'pass' : 'fail';
      
      results.insertAdjacentHTML('beforeend', `
        <div class="test-item">
          <span>${name}</span>
          <span class="${className}">${status}</span>
        </div>
      `);

      if (passed) testsPassed++;
      else testsFailed++;
    }

    function showSummary() {
      const summary = document.getElementById('summary');
      const title = document.getElementById('summaryTitle');
      const text = document.getElementById('summaryText');
      
      summary.style.display = 'block';
      
      if (testsFailed === 0) {
        title.textContent = '🎉 All Tests Passed!';
        title.className = 'pass';
        text.textContent = `${testsPassed}/${testsPassed} tests passed`;
      } else {
        title.textContent = '⚠️ Some Tests Failed';
        title.className = 'fail';
        text.textContent = `${testsPassed} passed, ${testsFailed} failed`;
      }
    }

    // Auto-run on load
    window.addEventListener('load', runAllTests);
  </script>
</body>
</html>
